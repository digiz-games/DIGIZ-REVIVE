<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="estilos.css">
    
<meta charset="UTF-8">
<title>Digiz Game Documento</title>

<style>
body {
    margin: 0;
    padding: 40px;
    background-image: url("Pacman 01.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
}

/* Texto principal */
.contenido {
    color: white;
    font-size: 30px;
    line-height: 1.5;
    
    /* Borde negro tipo contorno */
   text-shadow: 
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000,
        -4px  0px 0 #000,
         4px  0px 0 #000,
         0px -4px 0 #000,
         0px  4px 0 #000,
         5px  5px 8px #000;
    
    white-space: pre-wrap; /* Respeta espacios y saltos */
}

/* Imagen inferior */
.portal {
    display: block;
    margin: 50px auto;
    width: 200px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- Música -->
<audio id="musica" autoplay loop>
    <source src="dios.mp3" type="audio/mpeg">
</audio>

<script>
// Forzar reproducción en navegadores que bloquean autoplay
document.addEventListener("click", function() {
    const audio = document.getElementById("musica");
    audio.play();
}, { once: true });
</script>
